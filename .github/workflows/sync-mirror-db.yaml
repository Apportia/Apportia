name: Sync Mirror DB

on:
  schedule:
    - cron: '0 0 1 * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install dependencies
        run: pip install pycountry

      - name: Run sync script
        run: |
          python3 - <<'PYEOF'
          import json
          import pycountry
          import re
          import subprocess
          import sys
          from pathlib import Path

          MIRROR_PAGE = (
              "https://sourceforge.net/settings/mirror_choices"
              "?projectname=sevenzip&filename=7-Zip/24.09/7z2409-linux-x64.tar.xz"
          )
          TARGET = Path("data/mirror_database.json")

          _RE_ENTRY = re.compile(
              r'<li\s+id="([^"]+)">.*?</label>\s*(?:\(([^)]*)\))?',
              re.DOTALL,
          )

          PORTABLEAPPS_MIRRORS = {
              "downloads":  "Default",
              "download2":  "Mirror 2",
              "downloads2": "Mirror 3",
          }


          _DIRECTIONS = {
              "west": "Western", "east": "Eastern",
              "north": "Northern", "south": "Southern",
              "northwest": "Northwestern", "northeast": "Northeastern",
              "southwest": "Southwestern", "southeast": "Southeastern",
              "central": "Central", "midwest": "Midwestern",
          }


          def normalize_location(text):
              if not text:
                  return text
              parts = [p.strip() for p in text.split(",")]
              last = parts[-1]
              # Expand US state abbreviations: "Las Vegas, NV" → "Las Vegas, Nevada, United States"
              if len(last) == 2 and last.isupper():
                  sub = pycountry.subdivisions.get(code=f"US-{last}")
                  if sub is not None:
                      country = pycountry.countries.get(alpha_2="US").name
                      return ", ".join(parts[:-1] + [sub.name, country])
              return text


          def enrich_from_slug(slug, location):
              # Only enrich bare country names (no city info)
              if "," in location:
                  return location
              tokens = re.split(r"[-_]", slug.lower())
              for token in tokens:
                  qualifier = _DIRECTIONS.get(token)
                  if qualifier:
                      return f"{qualifier} {location}"
              return location


          def fetch_sourceforge():
              result = subprocess.run(
                  ["wget", "-q", "-O", "-", MIRROR_PAGE],
                  capture_output=True, text=True, encoding="utf-8",
              )
              if result.returncode not in (0, 8):
                  sys.exit(f"ERROR: wget exited {result.returncode}: {result.stderr.strip()}")
              mirrors_raw = {}
              for m in _RE_ENTRY.finditer(result.stdout):
                  slug = m.group(1).strip()
                  if slug == "autoselect":
                      continue
                  loc = enrich_from_slug(slug, normalize_location((m.group(2) or "").strip()))
                  mirrors_raw[slug] = loc
              if not mirrors_raw:
                  sys.exit("ERROR: No SourceForge mirrors parsed — page structure may have changed.")
              def loc_key(loc):
                  parts = [p.strip() for p in loc.split(",")]
                  return (parts[-1].casefold(), parts[0].casefold() if len(parts) > 1 else "")

              sorted_mirrors = dict(sorted(mirrors_raw.items(), key=lambda kv: loc_key(kv[1])))
              return {"downloads": "Auto-select"} | sorted_mirrors


          def main():
              data = {
                  "downloads.sourceforge.net": fetch_sourceforge(),
                  "downloads.portableapps.com": PORTABLEAPPS_MIRRORS,
              }
              result = json.dumps(data, indent=4, ensure_ascii=False) + "\n"
              if TARGET.exists() and TARGET.read_text(encoding="utf-8") == result:
                  print("No changes.")
                  return
              TARGET.parent.mkdir(parents=True, exist_ok=True)
              TARGET.write_text(result, encoding="utf-8", newline="\n")
              print(f"Updated: {TARGET}")

          main()
          PYEOF

      - name: Commit and push
        run: |
          git add data/mirror_database.json
          git diff --cached --quiet && exit 0
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: update mirror_database.json"
          for i in 1 2 3; do
            git push && break
            git pull --rebase
          done
