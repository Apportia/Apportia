name: Sync Mirror DB

on:
  schedule:
    - cron: '0 0 1 * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run sync script
        run: |
          python3 - <<'PYEOF'
          import json
          import re
          import subprocess
          import sys
          from pathlib import Path

          MIRROR_PAGE = (
              "https://sourceforge.net/settings/mirror_choices"
              "?projectname=sevenzip&filename=7-Zip/24.09/7z2409-linux-x64.tar.xz"
          )
          TARGET = Path("data/mirror_database.json")

          _RE_ENTRY = re.compile(
              r'<li\s+id="([^"]+)">.*?</label>\s*(?:\(([^)]*)\))?',
              re.DOTALL,
          )

          PORTABLEAPPS_MIRRORS = {
              "http://downloads.portableapps.com":  "Default",
              "http://download2.portableapps.com":  "Mirror 2",
              "http://downloads2.portableapps.com": "Mirror 3",
          }


          def fetch_sourceforge():
              result = subprocess.run(
                  ["wget", "-q", "-O", "-", MIRROR_PAGE],
                  capture_output=True, text=True, encoding="utf-8",
              )
              if result.returncode not in (0, 8):
                  sys.exit(f"ERROR: wget exited {result.returncode}: {result.stderr.strip()}")
              mirrors = {"https://downloads.sourceforge.net": "Auto-select"}
              for m in _RE_ENTRY.finditer(result.stdout):
                  slug = m.group(1).strip()
                  if slug == "autoselect":
                      continue
                  mirrors[f"https://{slug}.dl.sourceforge.net"] = (m.group(2) or "").strip()
              if len(mirrors) <= 1:
                  sys.exit("ERROR: No SourceForge mirrors parsed — page structure may have changed.")
              return mirrors


          def main():
              data = {
                  "https://downloads.sourceforge.net": fetch_sourceforge(),
                  "http://downloads.portableapps.com": PORTABLEAPPS_MIRRORS,
              }
              result = json.dumps(data, indent=4, ensure_ascii=False) + "\n"
              if TARGET.exists() and TARGET.read_text(encoding="utf-8") == result:
                  print("No changes.")
                  return
              TARGET.parent.mkdir(parents=True, exist_ok=True)
              TARGET.write_text(result, encoding="utf-8", newline="\n")
              print(f"Updated: {TARGET}")

          main()
          PYEOF

      - name: Commit and push
        run: |
          git add data/mirror_database.json
          git diff --cached --quiet && exit 0
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: update mirror_database.json"
          for i in 1 2 3; do
            git push && break
            git pull --rebase
          done
