name: Build

on:
  push:
    branches: [main]
    tags: ['[0-9]*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Install makensis
        run: sudo apt-get install -y nsis

      - name: Build
        run: bash build.sh Release

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Apportia
          path: bin/Release/
          retention-days: 30

      - name: Package release archive
        if: startsWith(github.ref, 'refs/tags/')
        id: package
        run: |
          name="Release_$(date -u +%Y-%m-%d_%H-%M-%S).zip"
          (cd bin/Release && zip -r "../../$name" .)
          echo "archive=$name" >> "$GITHUB_OUTPUT"

      - name: Create release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          archive="${{ steps.package.outputs.archive }}"
          if gh release view "$tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$tag" "$archive" --repo "$GITHUB_REPOSITORY" --clobber
          else
            gh release create "$tag" \
              --repo "$GITHUB_REPOSITORY" \
              --title "$tag" \
              --generate-notes \
              "$archive"
          fi
