name: Build

on:
  push:
    branches: [main]
    tags: ['[0-9]*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

env:
  TZ: Europe/Berlin

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Install makensis
        run: sudo apt-get install -y nsis

      - name: Build
        run: bash build.sh Release

      - name: Package release archive
        if: startsWith(github.ref, 'refs/tags/')
        id: package
        run: |
          name="Release_$(date +%Y-%m-%d_%H-%M-%S).zip"
          (cd bin/Release && zip -r "../../$name" .)
          echo "archive=$name" >> "$GITHUB_OUTPUT"

      - name: Create or update release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          set -euo pipefail
          tag="${GITHUB_REF#refs/tags/}"
          archive="${{ steps.package.outputs.archive }}"
          title="$(date +%Y-%m-%d)"

          prev=$(gh release list --repo "$GITHUB_REPOSITORY" \
            --exclude-drafts --exclude-pre-releases --limit 20 \
            --json tagName,createdAt \
            --jq "[.[] | select(.tagName != \"$tag\")] | sort_by(.createdAt) | reverse | .[0].tagName // empty")

          notes=""
          if [[ -n "$prev" ]]; then
            notes=$(TAG="$tag" PREV="$prev" REPO="$GITHUB_REPOSITORY" python3 <<'PY'
          import os, re, subprocess
          tag, prev, repo = os.environ["TAG"], os.environ["PREV"], os.environ["REPO"]
          body = subprocess.check_output(
              ["gh", "release", "view", prev, "--repo", repo, "--json", "body", "--jq", ".body"],
              text=True,
          )
          body = body.replace(f"refs/tags/{prev}", f"refs/tags/{tag}")
          link = f"**Full Changelog**: https://github.com/{repo}/compare/{prev}...{tag}"
          body = re.sub(
              r"<summary>Details</summary>.*?</details>",
              f"<summary>Details</summary>\n\n{link}\n</details>",
              body,
              flags=re.DOTALL,
          )
          print(body, end="")
          PY
          )
          fi

          if gh release view "$tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$tag" "$archive" --repo "$GITHUB_REPOSITORY" --clobber
            if [[ -n "$notes" ]]; then
              gh release edit "$tag" --repo "$GITHUB_REPOSITORY" --title "$title" --notes "$notes"
            else
              gh release edit "$tag" --repo "$GITHUB_REPOSITORY" --title "$title"
            fi
          else
            if [[ -n "$notes" ]]; then
              gh release create "$tag" --repo "$GITHUB_REPOSITORY" --title "$title" --notes "$notes" "$archive"
            else
              gh release create "$tag" --repo "$GITHUB_REPOSITORY" --title "$title" --generate-notes "$archive"
            fi
          fi
